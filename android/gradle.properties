org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Our app modules compile uniformly at JVM 17, but some third-party plugins
# (e.g. receive_sharing_intent 1.8.1) compile Java at 1.8 while Kotlin targets 17.
# AGP 8 + Kotlin 2.x treat that intra-module mismatch as an error; downgrade it to
# a warning so a plugin we don't control doesn't fail the release build. The mixed
# target is benign on our minSdk 26 (D8 desugars). Revisit when the plugin aligns.
kotlin.jvm.target.validation.mode=warning
