# Signed release build for Google Play (App Bundle).
# Triggered by pushing a version tag (e.g. v1.0.0-alpha.1) or manually.
# Signs with the UPLOAD key supplied via repo secrets (Play App Signing model);
# Google holds the app signing key. See SETUP.md for the secrets you must add.
#
# If the signing secrets are absent the build still runs but Gradle falls back
# to debug signing (see android/app/build.gradle.kts) — such an AAB is NOT
# acceptable to Play. Add the four ANDROID_* secrets before cutting a release.
name: Release (signed AAB)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  release-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — AAB will be DEBUG-signed and rejected by Play. See SETUP.md."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          cat > android/key.properties <<EOF
          storeFile=$RUNNER_TEMP/upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - run: flutter build appbundle --flavor prod --release -t lib/main_prod.dart

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: documink-prod-release-aab
          path: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          retention-days: 30
          if-no-files-found: error
