name: documink-ci
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      - run: flutter analyze --fatal-infos --fatal-warnings

  test:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      - run: flutter test

  apk-size-check:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      # prod is arm64-only (Tier-4 LiteRT/flutter_gemma is arm64; see app
      # build.gradle.kts), so this release APK is the real per-device size.
      - run: flutter build apk --flavor prod --release -t lib/main_prod.dart
      - name: Enforce Size Limit
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-prod-release.apk"
          SIZE=$(stat -c%s "$APK_PATH")
          echo "prod arm64 release APK size: $SIZE bytes"
          # 200 MB = Google Play's base-APK download limit. The on-device-AI
          # build (LiteRT native libs, trimmed) must stay under it. The model
          # itself is downloaded on demand, never in the APK (models.md §2.4).
          if [ "$SIZE" -gt 209715200 ]; then
            echo "Error: prod arm64 APK exceeds the 200MB Play base-APK limit."
            exit 1
          fi

  license-scan:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      - run: dart run tool/scripts/check_licenses.dart

  analytics-scan:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      - run: dart run tool/scripts/check_analytics_sdks.dart

  verify-model-hashes:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      - run: dart run tool/scripts/verify_model_hashes.dart

  codegen-freshness:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      # --force-jit is mandatory on Dart 3.10 (dart-lang/build#4343).
      - run: dart run build_runner build --force-jit --delete-conflicting-outputs
      # Committed *.g.dart must match a fresh codegen run.
      - name: Verify generated files are current
        run: git diff --exit-code -- '**/*.g.dart'
