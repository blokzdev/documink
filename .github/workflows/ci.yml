name: documink-ci
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      - run: flutter analyze --fatal-infos --fatal-warnings

  test:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      - run: flutter test

  apk-size-check:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      # Per-ABI release build (R8 on). We gate the realistic per-device download
      # — the arm64-v8a split APK — not the universal all-ABIs artifact, which
      # Play never ships (it delivers per-ABI via the AAB). This reflects the
      # real install size and gives the LiteRT/flutter_gemma native libs (Phase
      # 10b) honest headroom. Debug-signed (no signing secrets in this job).
      - run: flutter build apk --flavor prod --release --split-per-abi -t lib/main_prod.dart
      - name: Enforce Size Limit (arm64-v8a, the modern-phone download)
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-prod-arm64-v8a-release.apk"
          SIZE=$(stat -c%s "$APK_PATH")
          echo "arm64-v8a APK size: $SIZE bytes"
          if [ "$SIZE" -gt 157286400 ]; then
            echo "Error: arm64-v8a APK size exceeds 150MB limit."
            exit 1
          fi

  license-scan:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      - run: dart run tool/scripts/check_licenses.dart

  analytics-scan:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      - run: dart run tool/scripts/check_analytics_sdks.dart

  verify-model-hashes:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      - run: dart run tool/scripts/verify_model_hashes.dart

  codegen-freshness:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.6'
          cache: true
      - run: flutter pub get
      # --force-jit is mandatory on Dart 3.10 (dart-lang/build#4343).
      - run: dart run build_runner build --force-jit --delete-conflicting-outputs
      # Committed *.g.dart must match a fresh codegen run.
      - name: Verify generated files are current
        run: git diff --exit-code -- '**/*.g.dart'
